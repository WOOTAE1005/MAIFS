# DAAC Phase 2 Path A 설정 (scale-500 + GainPredictorRouter)
# 변경점:
#   - max_samples: 500/class (scale-up)
#   - guard.use_gain_predictor: true  (oracle weight margin → gain 직접 예측)
#   - guard.max_route_rate: 0.7 (gain predictor 신뢰도 높으므로 완화)
#   - feature_set: evidence_2ch (기존 최적 설정 유지)

collector:
  seed: 42
  device: cuda
  noise_backend: mvss
  spatial_backend: mesorch
  verbose_every: 50
  feature_set: evidence_2ch

datasets:
  classes:
    authentic:
      path: datasets/CASIA2_subset/Au
      sub_type: casia_au
      max_samples: 500
    manipulated:
      path: datasets/CASIA2_subset/Tp
      sub_type: casia_tp
      max_samples: 500
    ai_generated:
      path: datasets/GenImage_subset/BigGAN/val/ai
      sub_type: biggan
      max_samples: 500

split:
  seed: 300
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2

cobra:
  trust_scores:
    frequency: 0.85
    noise: 0.80
    fatformer: 0.85
    spatial: 0.85
  algorithm: drwa

router:
  oracle:
    power: 1.5
    eps: 1.0e-6
    target_mode: loss_averse
    label_smoothing: 0.02
    confidence_power: 0.5
    uncertain_penalty: 0.7
    entropy_power: 1.0
    verdict_power: 0.5
    margin_power: 1.0
    wrong_peak_power: 1.0
    majority_agreement_power: 2.0
    disagreement_penalty: 0.35
    uncertain_extra_penalty: 0.5
    adaptive_smoothing_scale: 0.25
    adaptive_smoothing_max: 0.35
  model:
    regressor: ridge
    ridge_alpha: 1.0
    hidden_layer_sizes: [64, 64]
    activation: relu
    solver: adam
    alpha: 1.0e-4
    learning_rate_init: 1.0e-3
    max_iter: 500
    early_stopping: true
    validation_fraction: 0.15
    n_iter_no_change: 20
    random_state: 42
  guard:
    enabled: true
    use_gain_predictor: true           # GainPredictorRouter 활성화 (핵심 변경)
    score_mode: top2_margin            # gain_predictor=false일 때의 fallback score
    n_thresholds: 33
    min_val_gain: 0.0
    min_phase2_val_gain: 0.0
    max_route_rate: 0.7                # gain predictor 기반이므로 0.5 → 0.7로 완화
    selection_scope: hybrid_only
    enforce_non_regression: true
    non_regression_tolerance: 0.0
    gain_predictor:                    # GainPredictorRouter 하이퍼파라미터
      n_estimators: 100
      max_depth: 3
      learning_rate: 0.1
      subsample: 0.8
      min_samples_leaf: 3
      random_state: 42

models:
  logistic_regression:
    C: 1.0
    max_iter: 1000
    solver: lbfgs

  gradient_boosting:
    backend: auto
    n_estimators: 200
    max_depth: 4
    learning_rate: 0.1
    subsample: 0.8

  mlp:
    backend: auto
    hidden_layer_sizes: [32, 16]
    activation: relu
    solver: adam
    max_iter: 500
    early_stopping: true
    validation_fraction: 0.15
    learning_rate_init: 0.001
    random_state: 42

evaluation:
  n_bootstrap: 200
  ci_level: 0.95

output:
  save_dir: experiments/results/phase2_patha_scale500_gain_predictor
